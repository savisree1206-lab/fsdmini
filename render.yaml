services:
  # Backend Service
  - type: web
    name: fsdmini-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: MONGO_URI
        sync: false # User needs to provide this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000

  # Frontend Static Site
  - type: web
    name: fsdmini-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: fsdmini-backend
          type: web
          property: host
